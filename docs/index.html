<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>淋浴房计算器 (L型 & 偏移方向修复版)</title>
    <style>
        :root {
            --primary: #0b657f;
            --primary-strong: #084d61;
            --accent: #c98a1b;
            --bg: #ebf0f4;
            --surface: rgba(255, 255, 255, 0.92);
            --surface-strong: #ffffff;
            --surface-soft: #f4f8fb;
            --text: #13202c;
            --muted: #647587;
            --success: #0f766e;
            --border: #d6e0e8;
            --border-strong: #c1ced9;
            --wall-color: #1f2937;
            --label-color: #1f2937;
            --guide-color: #dc2626;
            --guide-text-color: #dc2626;
            --angle-color: #d97706;
        }
        body {
            font-family: 'Segoe UI Variable Text', 'Microsoft YaHei UI', 'PingFang SC', sans-serif;
            background:
                linear-gradient(rgba(11, 101, 127, 0.045) 1px, transparent 1px),
                linear-gradient(90deg, rgba(11, 101, 127, 0.045) 1px, transparent 1px),
                linear-gradient(180deg, #f5f8fb 0%, #e7edf2 100%);
            background-size: 28px 28px, 28px 28px, auto;
            color: var(--text);
            margin: 0;
            padding: 24px 16px 34px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }
        .container {
            background: rgba(251, 252, 253, 0.95);
            width: 100%;
            max-width: 928px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.88);
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.10);
            overflow: hidden;
            padding-bottom: 18px;
            backdrop-filter: blur(8px);
        }
        header {
            position: relative;
            background: linear-gradient(180deg, rgba(251,253,254,0.98) 0%, rgba(241,246,250,0.98) 100%);
            color: var(--text);
            padding: 18px 22px 16px;
            text-align: left;
            border-bottom: 1px solid #dbe4eb;
        }
        header::before {
            content: "";
            position: absolute;
            top: 14px;
            left: 22px;
            width: 56px;
            height: 4px;
            border-radius: 999px;
            background: linear-gradient(90deg, var(--primary) 0%, #77c2d2 100%);
        }
        header h1 {
            margin: 0;
            padding-top: 12px;
            font-size: 1.38rem;
            letter-spacing: 0.04em;
            font-family: 'Bahnschrift SemiCondensed', 'Segoe UI Variable Display', 'Microsoft YaHei UI', sans-serif;
        }
        header p {
            margin: 6px 0 0;
            color: #728294;
            font-size: 0.81rem;
            letter-spacing: 0.03em;
            opacity: 1;
        }
        .content { padding: 18px 20px 20px; }
        .filter-row {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
            margin-bottom: 12px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            position: relative;
            min-width: 0;
            gap: 6px;
        }
        .filter-row > .form-group {
            padding: 10px 12px 12px;
            background: rgba(255,255,255,0.72);
            border: 1px solid #dde6ee;
            border-radius: 16px;
            box-shadow: 0 10px 18px rgba(15, 23, 42, 0.035);
        }
        label {
            display: block;
            margin-bottom: 0;
            font-weight: 700;
            font-size: 0.74rem;
            color: var(--muted);
            letter-spacing: 0.06em;
            line-height: 1.25;
        }
        input, select {
            width: 100%;
            padding: 10px 11px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 0.91rem;
            box-sizing: border-box;
            transition: border-color 0.18s ease, box-shadow 0.18s ease, background-color 0.18s ease, transform 0.18s ease;
            background: rgba(255,255,255,0.98);
            color: var(--text);
            box-shadow: none;
        }
        input:hover, select:hover {
            border-color: var(--border-strong);
        }
        input:focus, select:focus {
            border-color: rgba(11, 101, 127, 0.62);
            outline: none;
            box-shadow: 0 0 0 3px rgba(11, 101, 127, 0.10);
            transform: translateY(-1px);
        }
        .searchable-select {
            position: relative;
            z-index: 2;
        }
        .options-list {
            position: absolute;
            top: calc(100% + 6px);
            left: 12px;
            right: 12px;
            background: rgba(255,255,255,0.98);
            border: 1px solid rgba(11, 101, 127, 0.16);
            border-radius: 14px;
            max-height: 220px;
            overflow-y: auto;
            z-index: 100;
            display: none;
            box-shadow: 0 18px 30px rgba(15, 23, 42, 0.10);
            backdrop-filter: blur(8px);
        }
        .options-list.show { display: block; }
        .option-item {
            padding: 10px 13px;
            cursor: pointer;
            font-size: 0.91rem;
            border-bottom: 1px solid #edf2f7;
        }
        .option-item:hover {
            background-color: #eef6f8;
            color: var(--primary);
        }
        .option-item.active {
            background-color: #dceef3;
            color: var(--primary-strong);
            font-weight: 700;
        }
        .option-item:last-child { border-bottom: none; }
        .input-row { display: flex; gap: 10px; margin-bottom: 15px; }

        .btn-calc {
            width: 100%;
            padding: 11px 14px;
            background: linear-gradient(135deg, #0e728d 0%, #0a596f 100%);
            color: white;
            border: none;
            border-radius: 13px;
            font-size: 0.94rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
            margin-top: 6px;
            letter-spacing: 0.03em;
            box-shadow: 0 12px 22px rgba(11, 101, 127, 0.16);
        }
        .btn-calc:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 15px 28px rgba(11, 101, 127, 0.20);
        }
        .btn-calc:disabled {
            background: #edf3f7;
            color: #788696;
            border: 1px dashed #c7d2dd;
            box-shadow: none;
            cursor: not-allowed;
        }
        .action-row {
            display: flex;
            gap: 10px;
            margin-top: 6px;
        }
        .action-row .btn-calc {
            flex: 1;
            margin-top: 0;
        }

        .diagram-box {
            width: 100%;
            height: 284px;
            background: linear-gradient(180deg, #ffffff 0%, #f5f8fb 100%);
            border: 1px solid var(--border);
            transition: height 0.3s ease;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 16px 0 18px;
            position: relative;
            overflow: visible;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.92), 0 14px 28px rgba(15, 23, 42, 0.05);
        }
        #style-label,
        #install-label {
            font-size: 0.92rem !important;
            color: #b45309 !important;
            font-weight: 700 !important;
            letter-spacing: 0.05em;
            background: rgba(255, 248, 234, 0.92);
            border: 1px solid #f1d7aa;
            border-radius: 999px;
            padding: 8px 14px;
            box-shadow: 0 8px 16px rgba(201, 138, 27, 0.10);
            backdrop-filter: blur(4px);
        }
        #style-label {
            top: 14px !important;
            left: 14px !important;
        }
        #install-label {
            bottom: 14px !important;
            left: 14px !important;
        }
        svg { width: 100%; height: 100%; max-width: 660px; }

        .svg-wall { stroke: var(--wall-color); stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
        .svg-guide { stroke: var(--guide-color); stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 4 2; opacity: 0.95; }
        .svg-angle-arc { fill: none; stroke: var(--angle-color); stroke-width: 2; }
        .svg-text, .svg-guide-text, .svg-angle-text { fill: var(--label-color); font-weight: 800; font-family: monospace; text-anchor: middle; dominant-baseline: middle; paint-order: stroke; stroke: #ffffff; stroke-width: 3.5px; }
        .svg-text, .svg-guide-text { font-size: 17px; }
        .svg-guide-text { fill: var(--guide-text-color); }
        .svg-angle-text { font-size: 18px; fill: var(--angle-color); }

        .result-area {
            margin-top: 16px;
            background: linear-gradient(180deg, #fbfefc 0%, #f2fbf7 100%);
            border-radius: 16px;
            padding: 15px;
            border: 1px solid #d3e9dd;
            display: none;
            box-shadow: 0 10px 20px rgba(15, 118, 110, 0.05);
        }
        .result-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; text-align: center; }
        .res-item {
            background: white;
            padding: 11px 10px;
            border-radius: 12px;
            border: 1px solid #d9ece3;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.82);
        }
        .res-label { font-size: 0.75rem; color: #166534; margin-bottom: 4px; font-weight: bold; }
        .res-value { font-size: 1.2rem; font-weight: bold; color: #15803d; font-family: monospace; }
        .res-cad-ref { font-size: 0.65rem; color: #666; margin-top: 2px; }

        .control-row {
            display: grid;
            grid-template-columns: minmax(0, 1.45fr) minmax(0, 1.18fr) minmax(118px, 0.72fr) minmax(118px, 0.82fr);
            gap: 12px;
            margin-bottom: 10px;
            background: linear-gradient(180deg, rgba(244,248,251,0.82) 0%, rgba(250,252,253,0.82) 100%);
            padding: 10px 12px 9px;
            border-radius: 16px;
            border: 1px solid #d7e0e8;
            align-items: start;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.92);
        }
        .control-card,
        .control-card--mode,
        .control-card--direction,
        .control-card--field {
            grid-column: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 0;
            padding: 0;
            background: transparent;
            border: none;
            border-radius: 0;
            box-shadow: none;
        }
        .control-card-label {
            display: block;
            margin: 0;
            padding-left: 10px;
            border-left: 2px solid rgba(11, 101, 127, 0.18);
            font-size: 0.7rem;
            color: #627486;
            font-weight: 700;
            line-height: 1.15;
            letter-spacing: 0.05em;
        }
        .control-row input[type="number"] {
            width: 100%;
            min-height: 38px;
        }
        .control-note {
            font-size: 0.75rem;
            color: #5f7082;
            width: 100%;
            margin-top: 0;
            padding: 10px 12px;
            border-radius: 12px;
            border: 1px solid #d9e2ea;
            background: rgba(247,250,252,0.86);
        }

        .mode-selector {
            display: flex;
            align-items: stretch;
            background: rgba(238, 243, 247, 0.92);
            border-radius: 14px;
            padding: 4px;
            gap: 4px;
            width: 100%;
            min-width: 0;
            border: 1px solid #d7e0e8;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.85);
        }
        .mode-btn {
            position: relative;
            flex: 1;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 0;
            border: 1px solid transparent;
            background: transparent;
            padding: 8px 10px;
            color: #425262;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.18s ease, border-color 0.18s ease, color 0.18s ease, box-shadow 0.18s ease;
            text-align: center;
            line-height: 1.2;
            min-height: 38px;
            box-shadow: none;
        }
        .mode-btn-title {
            display: block;
            font-size: 0.79rem;
            font-weight: 700;
            letter-spacing: 0.015em;
            font-family: 'Bahnschrift SemiBold', 'Segoe UI Variable Text', 'Microsoft YaHei UI', sans-serif;
        }
        .mode-btn-subtitle {
            display: none;
        }
        .mode-btn--single {
            align-items: center;
            text-align: center;
        }
        .mode-btn--single .mode-btn-subtitle:empty {
            display: none;
        }
        .mode-btn.active {
            background: var(--surface-strong);
            color: var(--primary-strong);
            border-color: #d1dbe4;
            box-shadow: inset 0 -2px 0 var(--primary), 0 3px 8px rgba(15, 23, 42, 0.04);
        }
        .mode-btn:hover:not(.active) {
            background: rgba(255,255,255,0.72);
            border-color: #dde5ec;
        }

        @media (max-width: 760px) {
            body {
                padding: 18px 12px 26px;
            }
            .content {
                padding: 16px;
            }
            .filter-row {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
            .control-row {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
            .control-card,
            .control-card--mode,
            .control-card--direction {
                grid-column: span 2;
            }
            .control-card--field {
                grid-column: span 1;
            }
        }

        @media (max-width: 600px) {
            header {
                padding: 16px 16px 14px;
            }
            header::before {
                left: 16px;
            }
            header h1 {
                font-size: 1.2rem;
                padding-top: 10px;
            }
            .filter-row { grid-template-columns: 1fr; }
            .form-group { width: 100%; }
            .filter-row > .form-group {
                padding: 10px;
            }
            .input-row { flex-wrap: wrap; }
            .input-row .form-group { flex: 1 1 45%; }
            .control-row {
                grid-template-columns: 1fr;
                padding: 10px;
            }
            .control-card,
            .control-card--mode,
            .control-card--direction,
            .control-card--field { grid-column: span 1; }
            .mode-selector { width: 100%; }
            .diagram-box {
                height: 272px;
            }
            .action-row {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>📐 淋浴房计算器 (L型 & 偏移修复版)</h1>
        <p>修复L型左右转角及偏移方向</p>
    </header>

    <div class="content">
        <div class="filter-row">
            <div class="form-group">
                <label for="room-type">房型</label>
                <select id="room-type" onchange="handleRoomTypeChange()">
                    <option value="diamond">钻石型</option>
                    <option value="lshape">L 型</option>
                    <option value="tshape">T 型（待开发）</option>
                    <option value="arc">圆弧（待开发）</option>
                    <option value="sector">扇形（待开发）</option>
                </select>
            </div>
            
            <div class="form-group searchable-select">
                <label for="model-input">款式 (可搜索)</label>
                <input type="text" id="model-input" placeholder="输入型号..." autocomplete="off" oninput="handleModelInput()" onclick="showOptions()">
                <div id="options-list" class="options-list"></div>
                <input type="hidden" id="model-value">
            </div>

            <div class="form-group">
                <label for="install-type">安装基准</label>
                <select id="install-type" onchange="handleInstallTypeChange()">
                    <option value="stone_base">石基尺寸</option>
                    <option value="sink_top">下沉安装在上</option>
                    <option value="stone_center">石基居中</option>
                </select>
            </div>
        </div>

        <div class="control-row" id="control-row">
            <div class="control-card control-card--mode">
                <label class="control-card-label">📏 尺寸模式</label>
                <div class="mode-selector" id="diamond-mode-selector">
                    <button class="mode-btn active" onclick="setMode('angle')" id="btn-mode-angle"><span class="mode-btn-title">三边角度</span><span class="mode-btn-subtitle">已知角度</span></button>
                    <button class="mode-btn" onclick="setMode('cross')" id="btn-mode-cross"><span class="mode-btn-title">三边测距</span><span class="mode-btn-subtitle">两端到角</span></button>
                    <button class="mode-btn" onclick="setMode('pentagon')" id="btn-mode-pentagon"><span class="mode-btn-title">五边尺寸</span><span class="mode-btn-subtitle">辅助斜边</span></button>
                </div>
                <div class="mode-selector" id="lshape-mode-selector" style="display:none;">
                    <button class="mode-btn" onclick="setLShapeMode('left')" id="btn-lshape-left"><span class="mode-btn-title">左转角</span><span class="mode-btn-subtitle">L 型结构</span></button>
                    <button class="mode-btn" onclick="setLShapeMode('right')" id="btn-lshape-right"><span class="mode-btn-title">右转角</span><span class="mode-btn-subtitle">L 型结构</span></button>
                </div>
            </div>

            <div class="control-card control-card--direction">
                <label class="control-card-label">🚪 开启方向</label>
                <div class="mode-selector" id="direction-selector">
                    <button class="mode-btn active" onclick="setDirection('left')" id="btn-dir-left"><span class="mode-btn-title">左移</span><span class="mode-btn-subtitle">推门方向</span></button>
                    <button class="mode-btn" onclick="setDirection('right')" id="btn-dir-right"><span class="mode-btn-title">右移</span><span class="mode-btn-subtitle">推门方向</span></button>
                    <button class="mode-btn mode-btn--single" onclick="setDirection('none')" id="btn-dir-none"><span class="mode-btn-title">不显示</span><span class="mode-btn-subtitle"></span></button>
                </div>
            </div>

            <div class="control-card control-card--field">
                <label for="shorten-input" class="control-card-label">✂️ 端点修正 (mm)</label>
                <input type="number" id="shorten-input" value="5" step="0.5" oninput="drawDiagram()">
            </div>

            <div id="stone-center-width-group" class="control-card control-card--field" style="display:none;">
                <label for="stone-center-width" class="control-card-label">📐 石基宽度 (mm)</label>
                <input type="number" id="stone-center-width" value="60" step="1" oninput="drawDiagram()">
            </div>
        </div>
        <div class="control-note" id="mode-tip">
            💡 模式2说明：输入左/中/右长度，以及“左端点到右折点距离”和“右端点到左折点距离”，系统将自动计算角度。
        </div>

        <div class="diagram-box" style="position: relative;">
            <div id="style-label" style="position: absolute; top: 60px; left: 10px; font-size: 20px; color: #ef4444; font-weight: bold; pointer-events: none;"></div>
            <div id="install-label" style="position: absolute; bottom: 60px; left: 10px; font-size: 20px; color: #ef4444; font-weight: bold; pointer-events: none;"></div>
            <svg id="main-svg" preserveAspectRatio="xMidYMid meet">
                <text x="50%" y="50%" text-anchor="middle" fill="#9ca3af" font-size="16">请输入数据生成示意图</text>
            </svg>
        </div>

        <div id="diamond-inputs">
            <div id="input-group-pentagon" class="input-row" style="display:none;">
                <div class="form-group"><label>左斜边 (mm)</label><input type="number" id="input-ls" oninput="drawDiagram()"></div>
                <div class="form-group"><label>右斜边 (mm)</label><input type="number" id="input-rs" oninput="drawDiagram()"></div>
            </div>

            <div id="input-group-pentagon-sides" class="input-row" style="display:none;">
                <div class="form-group"><label>左线 (mm)</label><input type="number" id="input-l-5" oninput="drawDiagram()"></div>
                <div class="form-group"><label>右线 (mm)</label><input type="number" id="input-r-5" oninput="drawDiagram()"></div>
                <div class="form-group" style="visibility:hidden"><input></div>
            </div>

            <div id="input-group-sides-angle" class="input-row">
                <div class="form-group"><label>左线 (mm)</label><input type="number" id="input-l" oninput="drawDiagram()"></div>
                <div class="form-group" id="input-c-group"><label>中线 (mm)</label><input type="number" id="input-c" oninput="drawDiagram()"></div>
                <div class="form-group"><label>右线 (mm)</label><input type="number" id="input-r" oninput="drawDiagram()"></div>
            </div>
            
            <div id="input-group-angles" class="input-row">
                <div class="form-group"><label>左角度 (°)</label><input type="number" id="angle-l" value="135" oninput="drawDiagram()"></div>
                <div class="form-group"><label>右角度 (°)</label><input type="number" id="angle-r" value="135" oninput="drawDiagram()"></div>
                <div class="form-group" style="visibility:hidden"><input></div>
            </div>

            <div id="input-group-sides-cross" class="input-row" style="display:none;">
                <div class="form-group"><label>左线 (mm)</label><input type="number" id="input-l-2" oninput="drawDiagram()"></div>
                <div class="form-group"><label>中线 (mm)</label><input type="number" id="input-c-2" oninput="drawDiagram()"></div>
                <div class="form-group"><label>右线 (mm)</label><input type="number" id="input-r-2" oninput="drawDiagram()"></div>
            </div>
            <div id="input-group-cross-dist" class="input-row" style="display:none;">
                <div class="form-group">
                    <label>左端 ➝ 右折点 (mm)</label>
                    <input type="number" id="dist-l-to-p2" oninput="drawDiagram()">
                    <div style="font-size:0.65rem;color:#999;margin-top:2px;">(左线起点 到 中右连接点)</div>
                </div>
                <div class="form-group">
                    <label>右端 ➝ 左折点 (mm)</label>
                    <input type="number" id="dist-r-to-p1" oninput="drawDiagram()">
                    <div style="font-size:0.65rem;color:#999;margin-top:2px;">(右线起点 到 中左连接点)</div>
                </div>
                <div class="form-group" style="visibility:hidden"><input></div>
            </div>
        </div>

        <div id="lshape-inputs" style="display:none;">
            <div class="input-row">
                <div class="form-group"><label>正面尺寸 (mm)</label><input type="number" id="input-f" oninput="drawDiagram()"></div>
                <div class="form-group"><label>侧面尺寸 (mm)</label><input type="number" id="input-s" oninput="drawDiagram()"></div>
                <div class="form-group" style="visibility:hidden"><input></div>
            </div>
            <div class="control-note" style="margin-top:5px; color:#666;">
                ℹ️ L 型默认正面与侧面夹角为 90°，向外偏移。
            </div>
        </div>

        <div class="action-row">
            <button type="button" class="btn-calc" disabled>计算玻璃数据（待开发）</button>

        items.sort(function(a, b) {
            var aVisible = a.style.display !== 'none';
            var bVisible = b.style.display !== 'none';
            if (aVisible !== bVisible) {
                return aVisible ? -1 : 1;
            }

            if (aVisible && bVisible) {
                var lenDiff = getOptionSortLength(a) - getOptionSortLength(b);
                if (lenDiff !== 0) return lenDiff;
            }

            return (parseInt(a.dataset.order || '0', 10) - parseInt(b.dataset.order || '0', 10));
        });

        items.forEach(function(item) {
            optionsList.appendChild(item);
        });

            activeOptionIndex = -1;
            return;

        var visibleOptions = getVisibleOptions();
        if (!visibleOptions.length) {
            activeOptionIndex = -1;
            return;
        }
        activeOptionIndex = Math.max(0, Math.min(index, visibleOptions.length - 1));
        visibleOptions[activeOptionIndex].classList.add('active');

    function getSvgPoint(svg, clientX, clientY) {
        var pt = svg.createSVGPoint();
        pt.x = clientX;
        pt.y = clientY;
        var ctm = svg.getScreenCTM();
        if (!ctm) return { x: 0, y: 0 };
        var transformed = pt.matrixTransform(ctm.inverse());
        return { x: transformed.x, y: transformed.y };
    }

    function applyDirectionLabelPosition(label) {
        if (!label) return;
        var baseX = parseFloat(label.getAttribute('data-base-x')) || 0;
        var baseY = parseFloat(label.getAttribute('data-base-y')) || 0;
        label.setAttribute('x', baseX + directionLabelOffset.x);
        label.setAttribute('y', baseY + directionLabelOffset.y);
    }

    function addDirectionLabel(svg, labelText, basePos, styleText, allDrawnPoints) {
        var finalPos = {
            x: basePos.x + directionLabelOffset.x,
            y: basePos.y + directionLabelOffset.y

        svg.innerHTML += '<text id="direction-label" class="svg-direction-label" data-base-x="' + basePos.x + '" data-base-y="' + basePos.y + '" x="' + finalPos.x + '" y="' + finalPos.y + '" style="' + styleText + '">' + labelText + '</text>';
        if (allDrawnPoints) allDrawnPoints.push(finalPos);
        return finalPos;
    }

    function setupDirectionLabelInteraction() {
        var label = document.getElementById('direction-label');
        if (!label) return;
        label.style.cursor = 'grab';
        label.style.touchAction = 'none';
        label.addEventListener('pointerdown', function(e) {
            if (typeof e.button === 'number' && e.button !== 0) return;
            var svg = document.getElementById('main-svg');
            if (!svg) return;
            clearDirectionLabelLongPress();
            isDragging = false;
            directionLabelPointerId = e.pointerId;
            directionLabelPressClientPos = { x: e.clientX, y: e.clientY };
            dragStartPos = getSvgPoint(svg, e.clientX, e.clientY);
            dragStartOffset = { x: directionLabelOffset.x, y: directionLabelOffset.y };
            directionLabelLongPressTimer = setTimeout(function() {
                isDragging = true;
                label.style.cursor = 'grabbing';
                if (label.setPointerCapture) {
                    try { label.setPointerCapture(directionLabelPointerId); } catch (err) {}
                }
            }, DIRECTION_LABEL_LONG_PRESS_MS);
            e.preventDefault();
        });
    }

    document.addEventListener('pointermove', function(e) {
        if (directionLabelPointerId === null || e.pointerId !== directionLabelPointerId) return;
        var label = document.getElementById('direction-label');
        var svg = document.getElementById('main-svg');
        if (!label || !svg) {
            endDirectionLabelDrag();
            return;
        }

        if (!isDragging) {
            if (directionLabelPressClientPos && directionLabelLongPressTimer) {
                var dxPress = e.clientX - directionLabelPressClientPos.x;
                var dyPress = e.clientY - directionLabelPressClientPos.y;
                if (Math.sqrt(dxPress * dxPress + dyPress * dyPress) > DIRECTION_LABEL_MOVE_TOLERANCE) {
                    endDirectionLabelDrag();
                }
            }
            return;
        }

        var currentPos = getSvgPoint(svg, e.clientX, e.clientY);
        directionLabelOffset = {
            x: dragStartOffset.x + (currentPos.x - dragStartPos.x),
            y: dragStartOffset.y + (currentPos.y - dragStartPos.y)

        applyDirectionLabelPosition(label);
        e.preventDefault();

    function calculateAngleFromSides(a, b, c) {
        var cosVal = (a*a + b*b - c*c) / (2 * a * b);
        var clampedCos = Math.max(-1, Math.min(1, cosVal));
        var rad = Math.acos(clampedCos);
        return rad * 180 / Math.PI;
    }

    function getTransform(points, canvasW, canvasH, padding) {
        if (typeof padding === 'undefined') { padding = 5; }
        if (points.length === 0) return { scale: 1, tx: 0, ty: 0 };
        var xs = points.map(function(p) { return p.x; });
        var ys = points.map(function(p) { return p.y; });
        var minX = Math.min.apply(Math, xs), maxX = Math.max.apply(Math, xs);
        var minY = Math.min.apply(Math, ys), maxY = Math.max.apply(Math, ys);
        var graphW = maxX - minX, graphH = maxY - minY;
        var availW = canvasW - padding * 2, availH = canvasH - padding * 2;
        var scale = Math.min(availW / (graphW || 1), availH / (graphH || 1));
        return { 
            scale: scale, 
            tx: (canvasW / 2) - ((minX + maxX) / 2 * scale), 
            ty: (canvasH / 2) - ((minY + maxY) / 2 * scale) 
        };
    }

    function getModelOffset() {
        var installType = document.getElementById('install-type').value;
        var inputVal = modelInput.value.trim().replace('款', '');
        if (!inputVal) {
            var defaultOffset = (installType === 'stone_center') ? 0 : (installType === 'sink_top') ? 22 : -13;
            return { offset: defaultOffset, key: "默认" };
        }
        if (modelOffsets.hasOwnProperty(inputVal)) {
            var data = modelOffsets[inputVal];
            var offset = data[installType] || 0; // 使用提供的类型，如果未定义则默认为0
            return { offset: offset, key: inputVal };
        }
        for (var key in modelOffsets) {
            if (inputVal.startsWith(key)) {
                var data = modelOffsets[key];
                var offset = data[installType] || 0;
                return { offset: offset, key: key };
            }
        }
        var defaultOffset2 = (installType === 'stone_center') ? 0 : (installType === 'sink_top') ? 22 : -13;
        return { offset: defaultOffset2, key: "默认" };
    }

    function getModelOffset() {
        var installType = document.getElementById('install-type').value;
        var inputVal = modelInput.value.trim().replace('款', '');
        var stoneCenterWidthInput = document.getElementById('stone-center-width');

        function buildOffsetResult(key, data) {

                var stoneCenterVar = data ? (parseFloat(data.stone_center) || 0) : 0;
                return {
                    offset: stoneCenterVar - stoneCenterWidth / 2,
                    key: key,
                    stoneCenterWidth: stoneCenterWidth,
                    stoneCenterVar: stoneCenterVar
                };
            }
            return {
                offset: data ? (parseFloat(data[installType]) || 0) : ((installType === 'sink_top') ? 22 : -13),
                key: key,
                stoneCenterWidth: stoneCenterWidth,
                stoneCenterVar: 0
            };
        }

        if (!inputVal) {
            return buildOffsetResult('默认', null);
        }
        if (modelOffsets.hasOwnProperty(inputVal)) {
            return buildOffsetResult(inputVal, modelOffsets[inputVal]);
        }
        for (var key in modelOffsets) {
            if (inputVal.startsWith(key)) {
                return buildOffsetResult(key, modelOffsets[key]);
            }
        }
        return buildOffsetResult('默认', null);
    }

    function drawAngleArc(svg, pVertex, p1, p2, angleDeg, scale) {
        var v1 = { x: p1.x - pVertex.x, y: p1.y - pVertex.y };
        var v2 = { x: p2.x - pVertex.x, y: p2.y - pVertex.y };
        
        var len1 = Math.sqrt(v1.x*v1.x + v1.y*v1.y);
        var len2 = Math.sqrt(v2.x*v2.x + v2.y*v2.y);
        if(len1 === 0 || len2 === 0) return;
        
        var u1 = { x: v1.x/len1, y: v1.y/len1 };
        var u2 = { x: v2.x/len2, y: v2.y/len2 };

        var startAngle = Math.atan2(u1.y, u1.x);
        var endAngle = Math.atan2(u2.y, u2.x);
        
        var diff = endAngle - startAngle;
        while (diff <= -Math.PI) diff += 2*Math.PI;
        while (diff > Math.PI) diff -= 2*Math.PI;

        var radius = 18;
        if (angleDeg > 160) radius = 15;
        if (angleDeg === 90) radius = 22; 

        var x1 = pVertex.x + u1.x * radius;
        var y1 = pVertex.y + u1.y * radius;
        var x2 = pVertex.x + u2.x * radius;
        var y2 = pVertex.y + u2.y * radius;

        var largeArcFlag = Math.abs(diff) > Math.PI ? 1 : 0;
        var sweepFlag = diff > 0 ? 1 : 0;
        
        var pathData = 'M ' + x1 + ' ' + y1 + ' A ' + radius + ' ' + radius + ' 0 ' + largeArcFlag + ' ' + sweepFlag + ' ' + x2 + ' ' + y2;
        svg.innerHTML += '<path d="' + pathData + '" class="svg-angle-arc" />';

        var midAngle = startAngle + diff / 2;
        var textRadius = radius * 1.85;
        var tx = pVertex.x + Math.cos(midAngle) * textRadius;
        var ty = pVertex.y + Math.sin(midAngle) * textRadius;
        
        svg.innerHTML += '<text x="' + tx + '" y="' + ty + '" class="svg-angle-text">' + Math.round(angleDeg) + '°</text>';
    }

    function getLineIntersection(p1, p2, p3, p4, offset) {
        var dx1 = p2.x - p1.x, dy1 = p2.y - p1.y;
        var len1 = Math.sqrt(dx1*dx1 + dy1*dy1);
        var nx1 = -dy1 / len1, ny1 = dx1 / len1;
        var op1 = { x: p1.x + nx1 * offset, y: p1.y + ny1 * offset };
        var op2 = { x: p2.x + nx1 * offset, y: p2.y + ny1 * offset };

        var dx2 = p4.x - p3.x, dy2 = p4.y - p3.y;
        var len2 = Math.sqrt(dx2*dx2 + dy2*dy2);
        var nx2 = -dy2 / len2, ny2 = dx2 / len2;
        var op3 = { x: p3.x + nx2 * offset, y: p3.y + ny2 * offset };
        var op4 = { x: p4.x + nx2 * offset, y: p4.y + ny2 * offset };

        var x1 = op1.x, y1 = op1.y, x2 = op2.x, y2 = op2.y;
        var x3 = op3.x, y3 = op3.y, x4 = op4.x, y4 = op4.y;
        var denom = (y4 - y3) * (x2 - x1) - (x4 - x3) * (y2 - y1);
        if (denom === 0) return null;
        var ua = ((x4 - x3) * (y1 - y3) - (y4 - y3) * (x1 - x3)) / denom;
        return { x: x1 + ua * (x2 - x1), y: y1 + ua * (y2 - y1) };
    }

    function drawDiagram() {
        var type = document.getElementById('room-type').value;
        var installType = document.getElementById('install-type').value;
        var isSinkTop = (installType === 'sink_top');
        var isStoneCenter = (installType === 'stone_center');
        syncDirectionLabelOffset(type, installType);
        clearDirectionLabelLongPress();
        isDragging = false;
        directionLabelPointerId = null;
        directionLabelPressClientPos = null;
        
        var svg = document.getElementById('main-svg');
        svg.innerHTML = '';
        document.getElementById('result-area').style.display = 'none';
        document.getElementById('style-label').textContent = '';
        document.getElementById('install-label').textContent = '';
        var hasModelInput = !!modelInput.value.trim().replace('款', '');

        var modelData = getModelOffset();
        var GUIDE_OFFSET_MM = modelData.offset;
        var END_SHORTEN_MM = parseFloat(shortenInput.value) || 0; 
        
        var TEXT_OFFSET_MM = 50; 
        var GUIDE_TEXT_OFFSET_MM = isSinkTop ? 25 : -25; 
        var textDir = isSinkTop ? -1 : 1; 
        var suffixText = isSinkTop ? "下沉区" : "石基";

        var debugParts = ['款式：<b>' + modelData.key + '</b>', '房型：<b>' + type + '</b>', '安装：<b>' + installType + '</b>', '偏移：<b>' + GUIDE_OFFSET_MM + 'mm</b>'];
        var updateDebugInfo = function(extraParts) {
            if (!debugInfo) return;
            var parts = debugParts.slice();
            if (extraParts && extraParts.length) parts = parts.concat(extraParts);
            debugInfo.innerHTML = parts.join(' | ');
            debugInfo.style.display = parts.length ? 'block' : 'none';
        };

        if (isPendingRoomType(type)) {
            document.querySelector('.diagram-box').style.height = '280px';
            svg.setAttribute('viewBox', '0 0 500 280');
            svg.innerHTML += '<text x="50%" y="46%" text-anchor="middle" fill="#64748b" font-size="24" font-weight="700">' + getRoomTypeDisplayName(type) + '房型待开发</text>';
            svg.innerHTML += '<text x="50%" y="58%" text-anchor="middle" fill="#94a3b8" font-size="14">矢量结构与计算开门空间功能暂未开放</text>';
            return;
        }

        // 收集所有要绘制的点，用于最后的动态缩放
        var allDrawnPoints = [];

        if (type === 'diamond') {
            // --- 钻石型代码保持不变 ---
            var l, c, r, aL, aR;

            if (currentMode === 'angle') {
                l = parseFloat(document.getElementById('input-l').value) || 0;
                c = parseFloat(document.getElementById('input-c').value) || 0;
                r = parseFloat(document.getElementById('input-r').value) || 0;
                aL = parseFloat(document.getElementById('angle-l').value);
                aR = parseFloat(document.getElementById('angle-r').value);
                if (isNaN(aL) || aL <= 90 || aL >= 180) aL = 135;
                if (isNaN(aR) || aR <= 90 || aR >= 180) aR = 135;
                calculatedAngles = { l: aL, r: aR };
                debugParts.push('模式：<b>角度</b>', '输入角度：' + aL + '° / ' + aR + '°');

            } else if (currentMode === 'cross') {
                l = parseFloat(document.getElementById('input-l-2').value) || 0;
                c = parseFloat(document.getElementById('input-c-2').value) || 0;
                r = parseFloat(document.getElementById('input-r-2').value) || 0;
                var distLtoP2 = parseFloat(document.getElementById('dist-l-to-p2').value) || 0;
                var distRtoP1 = parseFloat(document.getElementById('dist-r-to-p1').value) || 0;

                if (l > 0 && c > 0 && distLtoP2 > 0) {
                    aL = calculateAngleFromSides(l, c, distLtoP2);
                } else {
                    aL = 135;
                }
                if (c > 0 && r > 0 && distRtoP1 > 0) {
                     aR = calculateAngleFromSides(c, r, distRtoP1);
                } else {
                    aR = 135;
                }
                
                if(isNaN(aL)) aL = 135;
                if(isNaN(aR)) aR = 135;
                calculatedAngles = { l: aL, r: aR };
                debugParts.push('模式：<b>交叉测距</b>', '反算角度：' + aL.toFixed(1) + '° / ' + aR.toFixed(1) + '°');
            } else if (currentMode === 'pentagon') {
                l = parseFloat(document.getElementById('input-l-5').value) || 0;  // D 左线
                r = parseFloat(document.getElementById('input-r-5').value) || 0;  // E 右线
                var ls = parseFloat(document.getElementById('input-ls').value) || 0;  // C 左斜边
                var rs = parseFloat(document.getElementById('input-rs').value) || 0;  // B 右斜边

                // 中线 = √((C-E)² + (B-D)²)
                c = Math.round(Math.sqrt(Math.pow(ls - r, 2) + Math.pow(rs - l, 2)));

                // 左角度 = 180° - arctan((C-E)/(B-D))
                aL = 180 - Math.atan2(ls - r, rs - l) * 180 / Math.PI;

                // 右角度 = 180° - arctan((B-D)/(C-E))
                aR = 180 - Math.atan2(rs - l, ls - r) * 180 / Math.PI;

                if(isNaN(aL) || !isFinite(aL)) aL = 135;
                if(isNaN(aR) || !isFinite(aR)) aR = 135;
                calculatedAngles = { l: aL, r: aR };
                debugParts.push('模式：<b>5边尺寸</b>', '计算中线：' + c.toFixed(1) + 'mm', '反算角度：' + aL.toFixed(1) + '° / ' + aR.toFixed(1) + '°');
            }

            if (l + c + r === 0) {
                updateDebugInfo(['状态：等待输入']);
                svg.innerHTML += '<text x="50%" y="50%" text-anchor="middle" fill="#9ca3af" font-size="16">请输入数据</text>';
                return;
            }

            var radL = (180 - aL) * Math.PI / 180;
            var dxL = -l * Math.cos(radL), dyL = -l * Math.sin(radL);
            var radR = (180 - aR) * Math.PI / 180;
            var dxR = r * Math.cos(radR), dyR = -r * Math.sin(radR);

            var pts = [
                { x: dxL, y: dyL },
                { x: 0, y: 0 },
                { x: c, y: 0 },
                { x: c + dxR, y: dyR }
            ];

            // 5边模式：预先计算交点并加入pts
            if (currentMode === 'pentagon') {
                var ls = parseFloat(document.getElementById('input-ls').value) || 0;
                var rs = parseFloat(document.getElementById('input-rs').value) || 0;
                if (ls > 0 && rs > 0) {
                    var leftDx = pts[1].x - pts[0].x;
                    var leftDy = pts[1].y - pts[0].y;
                    var leftLen = Math.sqrt(leftDx*leftDx + leftDy*leftDy);
                    var leftPerpX = -leftDy / leftLen;
                    var leftPerpY = leftDx / leftLen;

                    var rightDx = pts[2].x - pts[3].x;
                    var rightDy = pts[2].y - pts[3].y;
                    var rightLen = Math.sqrt(rightDx*rightDx + rightDy*rightDy);
                    var rightPerpX = rightDy / rightLen;
                    var rightPerpY = -rightDx / rightLen;

                    var denom = leftPerpX * rightPerpY - leftPerpY * rightPerpX;
                    if (Math.abs(denom) > 0.001) {
                        var dx = pts[3].x - pts[0].x;
                        var dy = pts[3].y - pts[0].y;
                        var t1 = (dx * rightPerpY - dy * rightPerpX) / denom;
                        var intersectX = pts[0].x + t1 * leftPerpX;
                        var intersectY = pts[0].y + t1 * leftPerpY;
                        pts.push({ x: intersectX, y: intersectY });
                    }
                }
            }

            // 动态调整图示框高度
            var diagramBox = document.querySelector('.diagram-box');
            var boxHeight = currentMode === 'pentagon' ? 390 : 280;
            diagramBox.style.height = boxHeight + 'px';

            var transform = getTransform(pts, 500, boxHeight, currentMode === 'pentagon' ? 10 : 0);
            var t = function(p) { return { x: p.x * transform.scale + transform.tx, y: p.y * transform.scale + transform.ty }; };
            var tPts = pts.map(t);
            var scale = transform.scale;

            var textOffsetPx = TEXT_OFFSET_MM * scale;
            var guideTextOffsetPx = GUIDE_TEXT_OFFSET_MM * scale;
            var shortenPx = END_SHORTEN_MM * scale;

            var pathData = 'M ' + tPts[0].x + ' ' + tPts[0].y + ' L ' + tPts[1].x + ' ' + tPts[1].y + ' L ' + tPts[2].x + ' ' + tPts[2].y + ' L ' + tPts[3].x + ' ' + tPts[3].y;
            svg.innerHTML += '<path d="' + pathData + '" class="svg-wall" />';

            drawAngleArc(svg, tPts[1], tPts[0], tPts[2], aL, scale);
            drawAngleArc(svg, tPts[2], tPts[1], tPts[3], aR, scale);

            // 显示开启方向标记
            var rawVal = modelInput.value.trim().replace('款', '');
            var model = models.find(m => m.name === rawVal + '款');
            if (model && currentDirection !== 'none') {
                var feature = model.feature;
                if (feature === '开门') {
                    // 开门：显示"轴"字
                    if (currentDirection === 'left') {
                        addDirectionLabel(svg, '轴', { x: tPts[1].x - 10 - 30 * scale, y: tPts[1].y + 15 }, 'font-size: 24px; fill: #b91c1c; font-weight: normal; font-family: Arial, sans-serif;', allDrawnPoints);
                    } else if (currentDirection === 'right') {
                        addDirectionLabel(svg, '轴', { x: tPts[2].x + 10 - 30 * scale, y: tPts[2].y + 15 }, 'font-size: 24px; fill: #b91c1c; font-weight: normal; font-family: Arial, sans-serif;', allDrawnPoints);
                    }
                } else if (feature === '移门') {
                    // 移门：显示"左移"或"右移"
                    if (currentDirection === 'left') {
                        var offsetX = (tPts[1].x - tPts[0].x) * 0.3;
                        var offsetY = (tPts[1].y - tPts[0].y) * 0.3;
                        addDirectionLabel(svg, '左移', { x: tPts[1].x - offsetX + 60, y: tPts[1].y - offsetY - 30 + 30 * scale }, 'font-size: 26px; fill: #b91c1c; font-weight: normal; font-family: Arial, sans-serif;', allDrawnPoints);
                    } else if (currentDirection === 'right') {
                        var offsetX = (tPts[2].x - tPts[3].x) * 0.3;
                        var offsetY = (tPts[2].y - tPts[3].y) * 0.3;
                        addDirectionLabel(svg, '右移', { x: tPts[2].x - offsetX - 60 - 100 * scale, y: tPts[2].y - offsetY - 30 + 30 * scale }, 'font-size: 26px; fill: #b91c1c; font-weight: normal; font-family: Arial, sans-serif;', allDrawnPoints);
                    }
                }
            }

            // 绘制蓝色辅助线
            if (currentMode === 'cross') {
                // 3边两端到角模式：绘制端点到折点的线段
                var distLtoP2 = parseFloat(document.getElementById('dist-l-to-p2').value) || 0;
                var distRtoP1 = parseFloat(document.getElementById('dist-r-to-p1').value) || 0;
                if (distLtoP2 > 0) {
                    svg.innerHTML += '<line x1="' + tPts[0].x + '" y1="' + tPts[0].y + '" x2="' + tPts[2].x + '" y2="' + tPts[2].y + '" stroke="#3b82f6" stroke-width="1" stroke-dasharray="3,3" />';
                    var midLtoP2 = { x: (tPts[0].x + tPts[2].x)/2, y: (tPts[0].y + tPts[2].y)/2 };
                    svg.innerHTML += '<text x="' + (midLtoP2.x - 50) + '" y="' + (midLtoP2.y - 5) + '" style="font-size: 20px; fill: #3b82f6;">' + Math.round(distLtoP2) + '</text>';
                }
                if (distRtoP1 > 0) {
                    svg.innerHTML += '<line x1="' + tPts[3].x + '" y1="' + tPts[3].y + '" x2="' + tPts[1].x + '" y2="' + tPts[1].y + '" stroke="#3b82f6" stroke-width="1" stroke-dasharray="3,3" />';
                    var midRtoP1 = { x: (tPts[3].x + tPts[1].x)/2, y: (tPts[3].y + tPts[1].y)/2 };
                    svg.innerHTML += '<text x="' + (midRtoP1.x + 10) + '" y="' + (midRtoP1.y - 5) + '" style="font-size: 20px; fill: #3b82f6;">' + Math.round(distRtoP1) + '</text>';
                }
            } else if (currentMode === 'pentagon') {
                // 5边尺寸模式：斜线垂直于左右线且相交
                var ls = parseFloat(document.getElementById('input-ls').value) || 0;
                var rs = parseFloat(document.getElementById('input-rs').value) || 0;

                if (ls > 0 && rs > 0) {
                    // 左线方向向量
                    var leftDx = pts[1].x - pts[0].x;
                    var leftDy = pts[1].y - pts[0].y;
                    var leftLen = Math.sqrt(leftDx*leftDx + leftDy*leftDy);
                    // 左斜线垂直方向（逆时针90度）
                    var leftPerpX = -leftDy / leftLen;
                    var leftPerpY = leftDx / leftLen;

                    // 右线方向向量
                    var rightDx = pts[2].x - pts[3].x;
                    var rightDy = pts[2].y - pts[3].y;
                    var rightLen = Math.sqrt(rightDx*rightDx + rightDy*rightDy);
                    // 右斜线垂直方向（顺时针90度）
                    var rightPerpX = rightDy / rightLen;
                    var rightPerpY = -rightDx / rightLen;

                    // 计算两条垂直线的交点
                    // 左线：pts[0] + t1 * leftPerp
                    // 右线：pts[3] + t2 * rightPerp
                    var denom = leftPerpX * rightPerpY - leftPerpY * rightPerpX;
                    if (Math.abs(denom) > 0.001) {
                        var dx = pts[3].x - pts[0].x;
                        var dy = pts[3].y - pts[0].y;
                        var t1 = (dx * rightPerpY - dy * rightPerpX) / denom;
                        var intersectX = pts[0].x + t1 * leftPerpX;
                        var intersectY = pts[0].y + t1 * leftPerpY;

                        var tIntersect = t({ x: intersectX, y: intersectY });

                        svg.innerHTML += '<line x1="' + tPts[0].x + '" y1="' + tPts[0].y + '" x2="' + tIntersect.x + '" y2="' + tIntersect.y + '" stroke="#3b82f6" stroke-width="1" stroke-dasharray="3,3" />';
                        drawAngleArc(svg, tPts[0], tPts[1], tIntersect, 90, scale);
                        var midLS = { x: (tPts[0].x + tIntersect.x)/2 - 20, y: (tPts[0].y + tIntersect.y)/2 };
                        svg.innerHTML += '<text x="' + (midLS.x - 10) + '" y="' + midLS.y + '" style="font-size: 20px; fill: #3b82f6;">' + Math.round(ls) + '</text>';

                        svg.innerHTML += '<line x1="' + tPts[3].x + '" y1="' + tPts[3].y + '" x2="' + tIntersect.x + '" y2="' + tIntersect.y + '" stroke="#3b82f6" stroke-width="1" stroke-dasharray="3,3" />';
                        drawAngleArc(svg, tPts[3], tIntersect, tPts[2], 90, scale);
                        var midRS = { x: (tPts[3].x + tIntersect.x)/2 - 20, y: (tPts[3].y + tIntersect.y)/2 };
                        svg.innerHTML += '<text x="' + (midRS.x + 10) + '" y="' + midRS.y + '" style="font-size: 20px; fill: #3b82f6;">' + Math.round(rs) + '</text>';

                        allDrawnPoints.push(tIntersect, midLS, midRS);
                    }
                }
            }

            var getPerpStart = function(pStart, pEnd, offset) {
                var dx = pEnd.x - pStart.x, dy = pEnd.y - pStart.y;
                var len = Math.sqrt(dx*dx + dy*dy);
                var nx = -dy/len, ny = dx/len;
                return { x: pStart.x + nx*offset, y: pStart.y + ny*offset };
            };
            var getPerpEnd = function(pStart, pEnd, offset) {
                var dx = pEnd.x - pStart.x, dy = pEnd.y - pStart.y;
                var len = Math.sqrt(dx*dx + dy*dy);
                var nx = -dy/len, ny = dx/len;
                return { x: pEnd.x + nx*offset, y: pEnd.y + ny*offset };
            };

            var newP1 = getLineIntersection(pts[0], pts[1], pts[1], pts[2], GUIDE_OFFSET_MM);
            var newP2 = getLineIntersection(pts[1], pts[2], pts[2], pts[3], GUIDE_OFFSET_MM);
            var newP0 = getPerpStart(pts[0], pts[1], GUIDE_OFFSET_MM);
            var newP3 = getPerpEnd(pts[2], pts[3], GUIDE_OFFSET_MM);

            var offPts = [newP0, newP1, newP2, newP3];
            var tOffPts = offPts.map(t);

            var getShortenedPt = function(tOff, isStart) {
                if (isStart) {
                    var dx = pts[1].x - pts[0].x, dy = pts[1].y - pts[0].y;
                    var len = Math.sqrt(dx*dx + dy*dy);
                    return { x: tOff.x + (dx/len) * shortenPx, y: tOff.y + (dy/len) * shortenPx };
                } else {
                    var dx = pts[3].x - pts[2].x, dy = pts[3].y - pts[2].y;
                    var len = Math.sqrt(dx*dx + dy*dy);
                    return { x: tOff.x - (dx/len) * shortenPx, y: tOff.y - (dy/len) * shortenPx };
                }
            };

            var rStart = getShortenedPt(tOffPts[0], true);
            var rEnd = getShortenedPt(tOffPts[3], false);

            var len1 = Math.sqrt(Math.pow(tOffPts[1].x - rStart.x, 2) + Math.pow(tOffPts[1].y - rStart.y, 2)) / scale;
            var len2 = Math.sqrt(Math.pow(tOffPts[2].x - tOffPts[1].x, 2) + Math.pow(tOffPts[2].y - tOffPts[1].y, 2)) / scale;
            var len3 = Math.sqrt(Math.pow(rEnd.x - tOffPts[2].x, 2) + Math.pow(rEnd.y - tOffPts[2].y, 2)) / scale;
            
            geoLengths = { l: len1, c: len2, r: len3 };

            if (hasModelInput) {
                var redPathData = 'M ' + rStart.x + ' ' + rStart.y + ' L ' + tOffPts[1].x + ' ' + tOffPts[1].y + ' L ' + tOffPts[2].x + ' ' + tOffPts[2].y + ' L ' + rEnd.x + ' ' + rEnd.y;
                svg.innerHTML += '<path d="' + redPathData + '" class="svg-guide" />';
            }

            var drawLabels = function(pStart, pEnd, val, isRed, segmentLen) {
                var mid = { x: (pStart.x + pEnd.x)/2, y: (pStart.y + pEnd.y)/2 };
                var dx = pEnd.x - pStart.x; var dy = pEnd.y - pStart.y;
                var len = Math.sqrt(dx*dx + dy*dy);
                if (len === 0) return;
                
                var displayLen = isRed ? Math.round(segmentLen) : val;
                var suffix = isRed ? " 材料尺寸" : suffixText;
                var textContent = displayLen + suffix;

                var nx = -dy/len; var ny = dx/len;
                if (!isRed) {
                    var isUpper = (mid.y < 280/2);
                    if (isUpper && ny > 0) { nx=-nx; ny=-ny; }
                    if (!isUpper && ny < 0) { nx=-nx; ny=-ny; }
                } else {
                    // 红色文字：确保偏移方向一致
                    if (ny < 0) { nx=-nx; ny=-ny; }
                }
                var offsetDist = isRed ? guideTextOffsetPx * 1.15 : (textDir * textOffsetPx * 1.12);
                var tx = mid.x + nx * offsetDist; var ty = mid.y + ny * offsetDist;
                var angle = Math.atan2(dy, dx) * 180 / Math.PI;
                if (angle > 90) angle -= 180; if (angle < -90) angle += 180;
                
                var className = isRed ? 'svg-guide-text' : 'svg-text';
                svg.innerHTML += '<text x="' + tx + '" y="' + ty + '" class="' + className + '" transform="rotate(' + angle + ', ' + tx + ', ' + ty + ')">' + textContent + '</text>';
                
                // 将文本中心点也加入包围盒计算
                allDrawnPoints.push({x: tx, y: ty});
            };

            drawLabels(tPts[0], tPts[1], l, false, 0);
            drawLabels(tPts[1], tPts[2], c, false, 0);
            drawLabels(tPts[2], tPts[3], r, false, 0);
            
            if (hasModelInput) {
                drawLabels(rStart, tOffPts[1], l, true, len1);
                drawLabels(tOffPts[1], tOffPts[2], c, true, len2);
                drawLabels(tOffPts[2], rEnd, r, true, len3);
            }

            // 添加所有点到总集合
            allDrawnPoints.push.apply(allDrawnPoints, tPts);
            if (hasModelInput) {
                allDrawnPoints.push.apply(allDrawnPoints, tOffPts);
                allDrawnPoints.push(rStart, rEnd);
            }

        } else if (type === 'lshape') {
            // --- 修复后的 L 型代码 ---
            var f = parseFloat(document.getElementById('input-f').value) || 0;
            var s = parseFloat(document.getElementById('input-s').value) || 0;
            if (f + s === 0) {
                updateDebugInfo(['状态：等待输入']);
                svg.innerHTML += '<text x="50%" y="50%" text-anchor="middle" fill="#9ca3af" font-size="16">请输入数据</text>';
                return;
            }

            debugParts.push('L型模式：<b>' + lShapeCornerMode + '转角</b>', '正面: ' + f + 'mm, 侧面: ' + s + 'mm');

            // --- L型核心计算逻辑 (参照参考版本) ---
            var pts;
            if (lShapeCornerMode === 'left') {
                pts = [
                    { x: 0, y: -s },  // 侧面起点
                    { x: 0, y: 0 },   // 转角点
                    { x: f, y: 0 }    // 正面终点
                ];
            } else {
                pts = [
                    { x: f, y: -s },  // 侧面起点
                    { x: f, y: 0 },   // 转角点
                    { x: 0, y: 0 }    // 正面终点
                ];
            }

            // 计算端点偏移函数
            var getPerpStart = function(pStart, pEnd, offset) {
                var dx = pEnd.x - pStart.x, dy = pEnd.y - pStart.y;
                var len = Math.sqrt(dx*dx + dy*dy);
                var nx = -dy/len, ny = dx/len;
                if (lShapeCornerMode === 'right') { nx = -nx; ny = -ny; }
                return { x: pStart.x + nx*offset, y: pStart.y + ny*offset };
            };
            var getPerpEnd = function(pStart, pEnd, offset) {
                var dx = pEnd.x - pStart.x, dy = pEnd.y - pStart.y;
                var len = Math.sqrt(dx*dx + dy*dy);
                var nx = -dy/len, ny = dx/len;
                if (lShapeCornerMode === 'right') { nx = -nx; ny = -ny; }
                return { x: pEnd.x + nx*offset, y: pEnd.y + ny*offset };
            };

            var newP1 = getLineIntersection(pts[0], pts[1], pts[1], pts[2], GUIDE_OFFSET_MM * (lShapeCornerMode === 'right' ? -1 : 1));
            var newP0 = getPerpStart(pts[0], pts[1], GUIDE_OFFSET_MM);
            var newP2 = getPerpEnd(pts[1], pts[2], GUIDE_OFFSET_MM);

            var offPts = [newP0, newP1, newP2];

            // 计算几何长度 (在缩放前)
            var rawLenSide = Math.sqrt(Math.pow(newP1.x - newP0.x, 2) + Math.pow(newP1.y - newP0.y, 2));
            var rawLenFront = Math.sqrt(Math.pow(newP2.x - newP1.x, 2) + Math.pow(newP2.y - newP1.y, 2));
            var geoLenSide = rawLenSide - END_SHORTEN_MM;
            var geoLenFront = rawLenFront - END_SHORTEN_MM;
            
            geoLengths = { f: geoLenFront, s: geoLenSide };

            // --- 动态缩放计算 ---
            var allRawPoints = hasModelInput ? pts.concat(offPts) : pts.slice();
            var transform = getTransform(allRawPoints, 500, 280, 0);
            var t = function(p) { return { x: p.x * transform.scale + transform.tx, y: p.y * transform.scale + transform.ty }; };
            var scale = transform.scale;
            var textOffsetPx = TEXT_OFFSET_MM * scale;
            var guideTextOffsetPx = GUIDE_TEXT_OFFSET_MM * scale;

            // --- 应用变换并绘制 ---
            var tPts = pts.map(t);
            var tOffPts = offPts.map(t);

            // 绘制墙体线
            svg.innerHTML += '<line x1="' + tPts[0].x + '" y1="' + tPts[0].y + '" x2="' + tPts[1].x + '" y2="' + tPts[1].y + '" class="svg-wall" />';
            svg.innerHTML += '<line x1="' + tPts[1].x + '" y1="' + tPts[1].y + '" x2="' + tPts[2].x + '" y2="' + tPts[2].y + '" class="svg-wall" />';

            // 绘制材料线 (应用端点缩短)
            var shortenVecS = { x: (tOffPts[1].x - tOffPts[0].x) / Math.sqrt(Math.pow(tOffPts[1].x - tOffPts[0].x, 2) + Math.pow(tOffPts[1].y - tOffPts[0].y, 2)), y: (tOffPts[1].y - tOffPts[0].y) / Math.sqrt(Math.pow(tOffPts[1].x - tOffPts[0].x, 2) + Math.pow(tOffPts[1].y - tOffPts[0].y, 2)) };
            var shortenVecF = { x: (tOffPts[2].x - tOffPts[1].x) / Math.sqrt(Math.pow(tOffPts[2].x - tOffPts[1].x, 2) + Math.pow(tOffPts[2].y - tOffPts[1].y, 2)), y: (tOffPts[2].y - tOffPts[1].y) / Math.sqrt(Math.pow(tOffPts[2].x - tOffPts[1].x, 2) + Math.pow(tOffPts[2].y - tOffPts[1].y, 2)) };

            var rStart = { x: tOffPts[0].x + shortenVecS.x * END_SHORTEN_MM * scale, y: tOffPts[0].y + shortenVecS.y * END_SHORTEN_MM * scale };
            var rEnd = { x: tOffPts[2].x - shortenVecF.x * END_SHORTEN_MM * scale, y: tOffPts[2].y - shortenVecF.y * END_SHORTEN_MM * scale };

            if (hasModelInput) {
                svg.innerHTML += '<line x1="' + rStart.x + '" y1="' + rStart.y + '" x2="' + tOffPts[1].x + '" y2="' + tOffPts[1].y + '" class="svg-guide" />';
                svg.innerHTML += '<line x1="' + tOffPts[1].x + '" y1="' + tOffPts[1].y + '" x2="' + rEnd.x + '" y2="' + rEnd.y + '" class="svg-guide" />';
            }

            // 绘制右转角（材料线）
            if (hasModelInput) {
                drawAngleArc(svg, tOffPts[1], tOffPts[0], tOffPts[2], 90, scale);
            }

            // 绘制标签
            var drawLabels = function(pStart, pEnd, val, isRed, segmentLen) {
                var mid = { x: (pStart.x + pEnd.x)/2, y: (pStart.y + pEnd.y)/2 };
                var dx = pEnd.x - pStart.x; var dy = pEnd.y - pStart.y;
                var len = Math.sqrt(dx*dx + dy*dy);
                if (len === 0) return;

                var displayLen = isRed ? Math.round(segmentLen) : val;
                var suffix = isRed ? " 材料尺寸" : suffixText;
                var textContent = displayLen + suffix;

                var nx = -dy/len; var ny = dx/len;
                if (lShapeCornerMode === 'right') { nx = -nx; ny = -ny; }
                if (!isRed) {
                    var isUpper = (mid.y < 280/2);
                    if (isUpper && ny > 0) { nx=-nx; ny=-ny; }
                    if (!isUpper && ny < 0) { nx=-nx; ny=-ny; }
                }
                var offsetDist = isRed ? guideTextOffsetPx * 2.15 : (textDir * textOffsetPx * 1.42);
                var tx = mid.x + nx * offsetDist; var ty = mid.y + ny * offsetDist;
                var angle = Math.atan2(dy, dx) * 180 / Math.PI;
                if (angle > 90) angle -= 180; if (angle < -90) angle += 180;

                var className = isRed ? 'svg-guide-text' : 'svg-text';
                svg.innerHTML += '<text x="' + tx + '" y="' + ty + '" class="' + className + '" transform="rotate(' + angle + ', ' + tx + ', ' + ty + ')">' + textContent + '</text>';

                allDrawnPoints.push({x: tx, y: ty});
            };

            // 墙体标签
            drawLabels(tPts[0], tPts[1], s, false, 0);
            drawLabels(tPts[1], tPts[2], f, false, 0);

            // 材料线标签
            if (hasModelInput) {
                drawLabels(rStart, tOffPts[1], s, true, geoLenSide);
                drawLabels(tOffPts[1], rEnd, f, true, geoLenFront);
            }

            // 添加开启方向标记
            if (currentDirection !== 'none') {
                var rawVal = modelInput.value.trim().replace('款', '');
                var model = models.find(m => m.name === rawVal + '款');
                var feature = model ? model.feature : '移门';
                var frontLeftPt = tPts[1].x <= tPts[2].x ? tPts[1] : tPts[2];
                var frontRightPt = tPts[1].x <= tPts[2].x ? tPts[2] : tPts[1];
                var frontDx = frontRightPt.x - frontLeftPt.x;
                var frontDy = frontRightPt.y - frontLeftPt.y;
                var frontLen = Math.sqrt(frontDx * frontDx + frontDy * frontDy) || 1;
                var frontUx = frontDx / frontLen;
                var frontUy = frontDy / frontLen;

                if (feature === '开门') {
                    var axisInset = Math.min(frontLen * 0.08, 18);
                    var axisPos = currentDirection === 'left'
                        ? { x: frontLeftPt.x + frontUx * axisInset - 30 * scale, y: frontLeftPt.y + frontUy * axisInset + 15 }
                        : { x: frontRightPt.x - frontUx * axisInset - 30 * scale, y: frontRightPt.y - frontUy * axisInset + 15 };
                    if (currentDirection === 'left') {
                        addDirectionLabel(svg, '轴', axisPos, 'font-size: 24px; fill: #b91c1c; font-weight: normal; font-family: Arial, sans-serif; text-anchor: middle; dominant-baseline: middle;', allDrawnPoints);
                    } else if (currentDirection === 'right') {
                        addDirectionLabel(svg, '轴', axisPos, 'font-size: 24px; fill: #b91c1c; font-weight: normal; font-family: Arial, sans-serif; text-anchor: middle; dominant-baseline: middle;', allDrawnPoints);
                    }
                } else if (feature === '移门') {
                    var slideInset = Math.min(frontLen * 0.28, 75);
                    var slidePos = currentDirection === 'left'
                        ? { x: frontLeftPt.x + frontUx * slideInset, y: frontLeftPt.y + frontUy * slideInset - 30 }
                        : { x: frontRightPt.x - frontUx * slideInset, y: frontRightPt.y - frontUy * slideInset - 30 };
                    if (currentDirection === 'left') {
                        addDirectionLabel(svg, '左移', slidePos, 'font-size: 26px; fill: #b91c1c; font-weight: normal; font-family: Arial, sans-serif; text-anchor: middle; dominant-baseline: middle;', allDrawnPoints);
                    } else if (currentDirection === 'right') {
                        addDirectionLabel(svg, '右移', slidePos, 'font-size: 26px; fill: #b91c1c; font-weight: normal; font-family: Arial, sans-serif; text-anchor: middle; dominant-baseline: middle;', allDrawnPoints);
                    }
                }
            }

            // 将所有L型相关的点加入总集合
            allDrawnPoints.push.apply(allDrawnPoints, tPts);
            if (hasModelInput) {
                allDrawnPoints.push.apply(allDrawnPoints, tOffPts);
                allDrawnPoints.push(rStart, rEnd);
            }
        }

        // --- 动态设置 SVG 的 viewBox ---
        if (allDrawnPoints.length > 0) {
            var xs = allDrawnPoints.map(function(p) { return p.x; });
            var ys = allDrawnPoints.map(function(p) { return p.y; });
            var minX = Math.min.apply(Math, xs), maxX = Math.max.apply(Math, xs);
            var minY = Math.min.apply(Math, ys), maxY = Math.max.apply(Math, ys);
            var padH, padV;
            if (type === 'diamond' && currentMode === 'pentagon') {
                padH = 80;
                padV = 30;
            } else if (type === 'diamond') {
                padH = 38;
                padV = 34;
            } else if (type === 'lshape') {
                padH = 40;
                padV = 35;
            } else {
                padH = 60;
                padV = 60;
            }
            var vbMinX = minX - padH;
            var vbMinY = minY - padV;
            var vbWidth = (maxX - minX) + 2*padH;
            var vbHeight = (maxY - minY) + 2*padV;

            svg.setAttribute('viewBox', vbMinX + ' ' + vbMinY + ' ' + vbWidth + ' ' + vbHeight);

            // --- 更新固定标签 ---
            var styleText = modelInput.value.trim().replace('款', '') || modelData.key;
            var installSelect = document.getElementById('install-type');
            var installText = installSelect.options[installSelect.selectedIndex].text;

            var styleLabel = document.getElementById('style-label');
            var installLabel = document.getElementById('install-label');

            styleLabel.textContent = styleText + '款';
            installLabel.textContent = installText;
            if (!hasModelInput) {
                styleLabel.textContent = '';
            }

            // 5边尺寸模式下调整标签位置
            if (type === 'diamond' && currentMode === 'pentagon') {
                styleLabel.style.top = '15px';
                installLabel.style.bottom = '15px';
            } else {
                styleLabel.style.top = '10px';
                installLabel.style.bottom = '10px';
            }
        } else {
            // 如果没有点，则使用默认视口
            svg.setAttribute('viewBox', '0 0 500 280');
        }

        updateDebugInfo();
        setupDirectionLabelInteraction();

    }


    function calculateGlassData() {
        var type = document.getElementById('room-type').value;
        var model = modelValue.value || modelInput.value.replace('款', '');
        var resultGrid = document.getElementById('result-grid');
        var resName = document.getElementById('res-model-name');
        if (!model) { alert("请选择款式"); return; }
        resName.textContent = model + '款';
        resultGrid.innerHTML = '';
        
        if (type === 'diamond') {
            if (geoLengths.l === 0) { alert("请先生成图"); return; }
            createResultItem("左扇", geoLengths.l);
            createResultItem("中扇", geoLengths.c);
            createResultItem("右扇", geoLengths.r);
        } else if (type === 'lshape') {
            if (geoLengths.f === 0) { alert("请先生成图"); return; }
            createResultItem("正面", geoLengths.f);
            createResultItem("侧面", geoLengths.s);
        }
        document.getElementById('result-area').style.display = 'block';
    }

    function createResultItem(label, geoLen) {
        var div = document.createElement('div');
        div.className = 'res-item';
        var shortenMm = parseFloat(shortenInput.value) || 0;
        div.innerHTML = '<div class="res-label">' + label + '</div><div class="res-value">' + geoLen.toFixed(2) + '</div><div class="res-cad-ref">端点修正: ' + shortenMm.toFixed(1) + 'mm</div>';
        document.getElementById('result-grid').appendChild(div);
    }

    initOptions();
    updateStoneCenterWidthVisibility();
    updateModeUI();
    updateLShapeModeUI();
    drawDiagram();

    // 回车跳转到下一个输入框
    document.addEventListener('keydown', function(e) {
        if (e.target === modelInput && optionsList.classList.contains('show')) {
            var visibleOptions = getVisibleOptions();
            if (e.key === 'ArrowDown' && visibleOptions.length) {
                e.preventDefault();
                setActiveOption(activeOptionIndex < 0 ? 0 : activeOptionIndex + 1);
                return;
            }
            if (e.key === 'ArrowUp' && visibleOptions.length) {
                e.preventDefault();
                setActiveOption(activeOptionIndex < 0 ? visibleOptions.length - 1 : activeOptionIndex - 1);
                return;
            }
            if (e.key === 'Enter' && visibleOptions.length) {
                e.preventDefault();
                var selectedOption = visibleOptions[activeOptionIndex > -1 ? activeOptionIndex : 0];
                if (selectedOption) selectOption(selectedOption.textContent);
                return;
            }
        }

        if (e.key === 'Enter' && e.target.tagName === 'INPUT') {
            e.preventDefault();
            var inputs = Array.from(document.querySelectorAll('input[type="number"], input[type="text"]')).filter(function(input) {
                return input.offsetParent !== null;
            });
            var index = inputs.indexOf(e.target);
            if (index > -1 && index < inputs.length - 1) {
                inputs[index + 1].focus();
                inputs[index + 1].select();
            }
        }
    });
</script>
